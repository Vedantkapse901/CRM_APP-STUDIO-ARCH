name: crm_app
description: "CRM Application for Architectural Projects Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^1.10.0

  # State Management
  provider: ^6.0.0

  # Routing
  go_router: ^13.0.0

  # API & HTTP
  http: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.0
  intl: ^0.19.0

  # Utils
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets configuration (add after creating asset directories)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/logos/

  # Fonts configuration (add after adding font files)
  # fonts:
  #   - family: Poppins
  #     fonts:
